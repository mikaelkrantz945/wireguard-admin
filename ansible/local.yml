---
# Local provisioning — runs on the same machine
# Usage: ansible-playbook -i inventory.yml local.yml
- name: Setup WireGuard Admin (local)
  hosts: localhost
  connection: local
  become: true
  tasks:

    # -- Prerequisites --

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      apt:
        name:
          - curl
          - git
          - ufw
          - htop
          - wireguard
          - wireguard-tools
          - nginx
          - certbot
          - python3-certbot-nginx
          - irqbalance
          - ethtool
        state: present

    - name: Install Docker (if not present)
      block:
        - name: Check if Docker is installed
          command: docker --version
          register: docker_check
          ignore_errors: true
          changed_when: false

        - name: Add Docker GPG key
          apt_key:
            url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
            state: present
          when: docker_check.rc != 0

        - name: Add Docker repository
          apt_repository:
            repo: "deb https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
            state: present
          when: docker_check.rc != 0

        - name: Install Docker packages
          apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-compose-plugin
            state: present
            update_cache: true
          when: docker_check.rc != 0

    - name: Enable Docker service
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Enable irqbalance
      systemd:
        name: irqbalance
        state: started
        enabled: true

    # -- Network tuning --

    - name: Enable IP forwarding
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        sysctl_file: /etc/sysctl.d/99-wireguard-perf.conf
      loop:
        - { key: "net.ipv4.ip_forward", value: "1" }
        - { key: "net.ipv6.conf.all.forwarding", value: "1" }
        - { key: "net.core.rmem_max", value: "26214400" }
        - { key: "net.core.wmem_max", value: "26214400" }
        - { key: "net.core.rmem_default", value: "1048576" }
        - { key: "net.core.wmem_default", value: "1048576" }
        - { key: "net.core.optmem_max", value: "25165824" }
        - { key: "net.core.netdev_max_backlog", value: "50000" }
        - { key: "net.ipv4.tcp_rmem", value: "4096 1048576 26214400" }
        - { key: "net.ipv4.tcp_wmem", value: "4096 1048576 26214400" }
        - { key: "net.ipv4.udp_rmem_min", value: "8192" }
        - { key: "net.ipv4.udp_wmem_min", value: "8192" }
        - { key: "net.ipv4.tcp_congestion_control", value: "bbr" }
        - { key: "net.ipv4.tcp_fastopen", value: "3" }
        - { key: "net.ipv4.tcp_mtu_probing", value: "1" }
        - { key: "net.ipv4.tcp_slow_start_after_idle", value: "0" }
        - { key: "net.ipv4.tcp_no_metrics_save", value: "1" }

    - name: Increase conntrack max
      sysctl:
        name: net.netfilter.nf_conntrack_max
        value: "131072"
        sysctl_set: true
        state: present
        sysctl_file: /etc/sysctl.d/99-wireguard-perf.conf
      ignore_errors: true

    # -- Firewall --

    - name: Configure UFW
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: "22", proto: "tcp" }
        - { port: "80", proto: "tcp" }
        - { port: "443", proto: "tcp" }
        - { port: "{{ wg_port }}", proto: "udp" }

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

    # -- WireGuard --

    - name: Ensure /etc/wireguard directory exists
      file:
        path: /etc/wireguard
        state: directory
        mode: "0700"

    - name: Enable wg0 auto-start on boot
      systemd:
        name: wg-quick@wg0
        enabled: true
      ignore_errors: true

    # -- Nginx --

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Check if certbot has configured SSL
      stat:
        path: /etc/letsencrypt/live/{{ domain }}/fullchain.pem
      register: ssl_cert

    - name: Deploy nginx vhost config
      template:
        src: roles/nginx/templates/wireguard-admin.conf.j2
        dest: /etc/nginx/sites-available/wireguard-admin
        mode: "0644"
      when: not ssl_cert.stat.exists
      notify: Reload nginx

    - name: Enable nginx vhost
      file:
        src: /etc/nginx/sites-available/wireguard-admin
        dest: /etc/nginx/sites-enabled/wireguard-admin
        state: link
      notify: Reload nginx

    - name: Enable and start nginx
      systemd:
        name: nginx
        state: started
        enabled: true

    # -- Application --

    - name: Deploy .env file
      template:
        src: roles/app/templates/env.j2
        dest: "{{ project_dir }}/.env"
        mode: "0600"

    - name: Build and start containers
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        build: always
        state: present

    - name: Wait for API
      uri:
        url: "http://127.0.0.1:{{ api_port }}/health"
        status_code: 200
      retries: 15
      delay: 3

    - name: Show success message
      debug:
        msg:
          - "WireGuard Admin is running!"
          - "Admin GUI: http://{{ domain }}/admin/ui"
          - "User Portal: http://{{ domain }}/portal/ui"
          - ""
          - "Next: Bootstrap your admin account with:"
          - "curl -X POST http://localhost:{{ api_port }}/admin/bootstrap -H 'Content-Type: application/json' -d '{\"firstname\":\"Admin\",\"lastname\":\"User\",\"email\":\"{{ contact_email }}\",\"password\":\"changeme1\"}'"
          - ""
          - "Then run certbot for HTTPS:"
          - "cd ansible && ansible-playbook -i inventory.yml certbot.yml"

  handlers:
    - name: Reload nginx
      systemd:
        name: nginx
        state: reloaded
