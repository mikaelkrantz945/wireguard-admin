---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - curl
      - git
      - ufw
      - htop
      - unzip
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
    state: present

- name: Set timezone
  timezone:
    name: UTC

- name: Configure UFW - allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Configure UFW - allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Configure UFW - allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Configure UFW - allow WireGuard
  ufw:
    rule: allow
    port: "{{ wg_port }}"
    proto: udp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
