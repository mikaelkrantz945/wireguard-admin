---
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Check if certbot has configured SSL
  stat:
    path: /etc/letsencrypt/live/{{ domain }}/fullchain.pem
  register: ssl_cert
  when: ssl_mode | default('local') == 'local'

- name: Deploy nginx vhost config (proxy mode — always)
  template:
    src: wireguard-admin.conf.j2
    dest: /etc/nginx/sites-available/wireguard-admin
    mode: "0644"
  when: ssl_mode | default('local') == 'proxy'
  notify: Reload nginx

- name: Deploy nginx vhost config (local mode — only if SSL not yet configured)
  template:
    src: wireguard-admin.conf.j2
    dest: /etc/nginx/sites-available/wireguard-admin
    mode: "0644"
  when: ssl_mode | default('local') == 'local' and not ssl_cert.stat.exists
  notify: Reload nginx

- name: Enable nginx vhost
  file:
    src: /etc/nginx/sites-available/wireguard-admin
    dest: /etc/nginx/sites-enabled/wireguard-admin
    state: link
  notify: Reload nginx

- name: Deploy captive portal catch-all (proxy mode — always)
  template:
    src: captive-portal.conf.j2
    dest: /etc/nginx/sites-available/captive-portal
    mode: "0644"
  when: ssl_mode | default('local') == 'proxy'
  notify: Reload nginx

- name: Deploy captive portal catch-all (local mode — after SSL cert exists)
  template:
    src: captive-portal.conf.j2
    dest: /etc/nginx/sites-available/captive-portal
    mode: "0644"
  when: ssl_mode | default('local') == 'local' and ssl_cert.stat.exists
  notify: Reload nginx

- name: Enable captive portal catch-all
  file:
    src: /etc/nginx/sites-available/captive-portal
    dest: /etc/nginx/sites-enabled/captive-portal
    state: link
  when: ssl_mode | default('local') == 'proxy' or (ssl_mode | default('local') == 'local' and ssl_cert.stat.exists)
  notify: Reload nginx

- name: Test nginx config
  command: nginx -t
  changed_when: false

- name: Enable and start nginx
  systemd:
    name: nginx
    state: started
    enabled: true
