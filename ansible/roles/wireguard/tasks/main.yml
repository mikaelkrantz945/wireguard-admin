---
- name: Install WireGuard
  apt:
    name:
      - wireguard
      - wireguard-tools
    state: present

- name: Enable IP forwarding (IPv4)
  sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: Enable IP forwarding (IPv6)
  sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: Ensure /etc/wireguard directory exists
  file:
    path: /etc/wireguard
    state: directory
    mode: "0700"

- name: Enable wg0 auto-start on boot
  systemd:
    name: wg-quick@wg0
    enabled: true
  when: ansible_facts.services is not defined or true
  ignore_errors: true
